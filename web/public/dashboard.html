<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Miku Bot Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #07151a;
            color: #e8ffff;
        }

        header {
            padding: 24px;
            background: linear-gradient(135deg, #39c5bb, #5b9dff);
            color: #031014;
        }

        main {
            padding: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        section {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
        }

        button,
        select,
        input {
            border-radius: 10px;
            border: 0;
            padding: 10px 12px;
            margin: 4px;
        }

        button {
            background: #39c5bb;
            color: #031014;
            font-weight: 700;
            cursor: pointer;
        }

        pre {
            white-space: pre-wrap;
            background: rgba(0, 0, 0, .25);
            border-radius: 12px;
            padding: 12px;
            overflow: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }
    </style>
</head>

<body>
    <header>
        <h1>🎤 Miku Bot Dashboard</h1>
        <p>서버별 큐, 설정, 즐겨찾기, 플레이리스트를 확인해요.</p>
    </header>
    <main>
        <section>
            <h2>서버 선택</h2>
            <select id="guildSelect"></select>
            <button onclick="loadStatus()">새로고침</button>
        </section>
        <div class="grid">
            <section>
                <h2>현재 상태</h2>
                <pre id="status">불러오는 중...</pre>
            </section>
            <section>
                <h2>설정 변경</h2>
                <label><input id="autoDjEnabled" type="checkbox" /> 자동 DJ</label><br />
                <input id="autoDjMood" placeholder="자동 DJ 분위기" />
                <input id="aiChannelId" placeholder="AI 채널 ID, 비우면 전체 허용" />
                <button onclick="saveSettings()">저장</button>
            </section>
        </div>
        <section>
            <h2>즐겨찾기</h2>
            <pre id="favorites"></pre>
        </section>
        <section>
            <h2>플레이리스트</h2>
            <pre id="playlists"></pre>
        </section>
    </main>
    <script>
        async function api(path, options) {
            const params = new URLSearchParams(location.search);
            const token = params.get('token');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['x-dashboard-token'] = token;
            const res = await fetch(path, { ...options, headers: { ...headers, ...(options?.headers || {}) } });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadGuilds() {
            const guilds = await api('/api/guilds');
            const select = document.getElementById('guildSelect');
            select.innerHTML = guilds.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            await loadStatus();
        }

        async function loadStatus() {
            const guildId = document.getElementById('guildSelect').value;
            if (!guildId) return;
            const status = await api(`/api/guilds/${guildId}/status`);
            const favorites = await api(`/api/guilds/${guildId}/favorites`);
            const playlists = await api(`/api/guilds/${guildId}/playlists`);
            document.getElementById('status').textContent = JSON.stringify(status, null, 2);
            document.getElementById('favorites').textContent = JSON.stringify(favorites, null, 2);
            document.getElementById('playlists').textContent = JSON.stringify(playlists, null, 2);
            document.getElementById('autoDjEnabled').checked = !!status.settings.autoDj.enabled;
            document.getElementById('autoDjMood').value = status.settings.autoDj.mood || '';
            document.getElementById('aiChannelId').value = status.settings.aiChannelId || '';
        }

        async function saveSettings() {
            const guildId = document.getElementById('guildSelect').value;
            const body = {
                aiChannelId: document.getElementById('aiChannelId').value || null,
                autoDj: {
                    enabled: document.getElementById('autoDjEnabled').checked,
                    mood: document.getElementById('autoDjMood').value || '미쿠 추천'
                }
            };
            await api(`/api/guilds/${guildId}/settings`, { method: 'POST', body: JSON.stringify(body) });
            await loadStatus();
            alert('저장했어요~');
        }

        loadGuilds().catch(err => {
            document.getElementById('status').textContent = err.message;
        });
    </script>
</body>

</html>
